<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Particles Mode - Hand Gesture 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #mode-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: #000;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <canvas id="three-canvas"></canvas>
        <div id="mode-label">✨ ANIMATED PARTICLES MODE</div>
        <div id="status">Loading...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============ THREE.JS SETUP ============
        const threeCanvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // ============ MODEL LOADING ============
        const modelPaths = [
            '../image_models/turbine__turbofan_engine__jet_engine.glb',
            '../image_models/ksp_primitive_orbital_station_complex.glb',
            '../image_models/iss.glb'
        ];

        const loader = new GLTFLoader();
        const models = [];
        const particleSystems = [];
        let currentModelIndex = 0;
        let modelsLoaded = 0;
        let modelActive = false;

        // Animation parameters
        const breatheSpeed = 2.0;
        const breatheAmount = 0.03;
        const waveSpeed = 1.5;
        const waveAmount = 0.02;

        modelPaths.forEach((path, index) => {
            loader.load(path, (gltf) => {
                const model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim;
                
                model.scale.setScalar(scale);
                model.position.sub(center.multiplyScalar(scale));
                model.updateMatrixWorld(true);
                
                models[index] = model;
                
                const particleSystem = createAnimatedParticles(model, index);
                particleSystem.visible = false;
                particleSystems[index] = particleSystem;
                scene.add(particleSystem);
                
                modelsLoaded++;
                if (modelsLoaded === modelPaths.length) {
                    document.getElementById('status').textContent = '✊ Make a FIST to show animated particles';
                }
            },
            (progress) => {
                const percent = (progress.loaded / progress.total * 100).toFixed(0);
                document.getElementById('status').textContent = `Loading models... ${percent}%`;
            },
            (error) => {
                console.error('Error loading model:', error);
            });
        });

        function createAnimatedParticles(model, modelIndex) {
            const positions = [];
            const colors = [];
            const sizes = [];
            const offsets = [];
            
            model.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    const posAttr = child.geometry.attributes.position;
                    const matrix = child.matrixWorld;
                    
                    for (let i = 0; i < posAttr.count; i++) {
                        const vertex = new THREE.Vector3(
                            posAttr.getX(i),
                            posAttr.getY(i),
                            posAttr.getZ(i)
                        ).applyMatrix4(matrix);
                        
                        positions.push(vertex.x, vertex.y, vertex.z);
                        
                        // Rainbow gradient based on angle
                        const angle = Math.atan2(vertex.z, vertex.x);
                        const hue = (angle + Math.PI) / (2 * Math.PI);
                        const color = new THREE.Color().setHSL(hue, 0.8, 0.6);
                        colors.push(color.r, color.g, color.b);
                        
                        // Varied sizes
                        sizes.push(0.02 + Math.random() * 0.03);
                        
                        // Random offset for animation variation
                        offsets.push(Math.random() * Math.PI * 2);
                    }
                }
            });
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
            geometry.setAttribute('offset', new THREE.Float32BufferAttribute(offsets, 1));
            
            // Store original positions for animation
            geometry.userData.originalPositions = new Float32Array(positions);
            
            // Custom shader material for animated particles
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    breatheAmount: { value: breatheAmount },
                    waveAmount: { value: waveAmount }
                },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    attribute float offset;
                    
                    uniform float time;
                    uniform float breatheAmount;
                    uniform float waveAmount;
                    
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        
                        // Breathing effect
                        float breathe = sin(time * 2.0 + offset) * breatheAmount;
                        
                        // Wave effect
                        float wave = sin(time * 1.5 + position.y * 3.0 + offset) * waveAmount;
                        
                        // Sparkle effect on alpha
                        vAlpha = 0.6 + sin(time * 5.0 + offset * 10.0) * 0.4;
                        
                        vec3 pos = position;
                        pos += normalize(position) * breathe;
                        pos.x += wave;
                        pos.z += wave * 0.5;
                        
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * 300.0 / -mvPosition.z;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        
                        float glow = 1.0 - dist * 2.0;
                        glow = pow(glow, 1.5);
                        
                        gl_FragColor = vec4(vColor * glow * 1.5, vAlpha * glow);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            return new THREE.Points(geometry, material);
        }

        // ============ HAND TRACKING SETUP ============
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let gestureTimeout = false;

        // Hand connections for drawing
        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],
            [0, 5], [5, 6], [6, 7], [7, 8],
            [0, 9], [9, 10], [10, 11], [11, 12],
            [0, 13], [13, 14], [14, 15], [15, 16],
            [0, 17], [17, 18], [18, 19], [19, 20],
            [5, 9], [9, 13], [13, 17]
        ];

        function countFingers(landmarks) {
            let count = 0;
            
            const thumbTip = landmarks[4];
            const thumbIP = landmarks[3];
            const thumbMCP = landmarks[2];
            if (Math.abs(thumbTip.x - thumbMCP.x) > Math.abs(thumbIP.x - thumbMCP.x) * 1.2) {
                count++;
            }
            
            if (landmarks[8].y < landmarks[6].y) count++;
            if (landmarks[12].y < landmarks[10].y) count++;
            if (landmarks[16].y < landmarks[14].y) count++;
            if (landmarks[20].y < landmarks[18].y) count++;
            
            return count;
        }

        function drawLandmarks(landmarks, color) {
            ctx.fillStyle = color;
            for (const landmark of landmarks) {
                const x = landmark.x * canvas.width;
                const y = landmark.y * canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function drawConnections(landmarks, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            for (const [start, end] of HAND_CONNECTIONS) {
                ctx.beginPath();
                ctx.moveTo(landmarks[start].x * canvas.width, landmarks[start].y * canvas.height);
                ctx.lineTo(landmarks[end].x * canvas.width, landmarks[end].y * canvas.height);
                ctx.stroke();
            }
        }

        function onResults(results) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let leftHand = null;

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label;
                    const isLeft = handedness === 'Right';

                    const color = isLeft ? '#FF6B6B' : '#4ECDC4';
                    drawConnections(landmarks, color);
                    drawLandmarks(landmarks, color);

                    if (isLeft) {
                        leftHand = landmarks;
                    }
                }
            }

            if (leftHand && !gestureTimeout) {
                const fingerCount = countFingers(leftHand);
                
                const wrist = leftHand[0];
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = fingerCount === 0 ? '#00FF00' : fingerCount === 3 ? '#FFD700' : '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.fillText(fingerCount.toString(), wrist.x * canvas.width, wrist.y * canvas.height + 60);

                if (fingerCount === 0) {
                    gestureTimeout = true;
                    setTimeout(() => gestureTimeout = false, 800);
                    
                    if (!modelActive) {
                        particleSystems[currentModelIndex].visible = true;
                        modelActive = true;
                        status.textContent = `✨ Animated Particles ${currentModelIndex + 1}/${particleSystems.length} | ✋ 3 fingers to cycle | ✊ Fist to hide`;
                    } else {
                        particleSystems[currentModelIndex].visible = false;
                        modelActive = false;
                        status.textContent = '✊ Make a FIST to show animated particles';
                    }
                } else if (fingerCount === 3 && modelActive) {
                    gestureTimeout = true;
                    setTimeout(() => gestureTimeout = false, 800);
                    
                    particleSystems[currentModelIndex].visible = false;
                    currentModelIndex = (currentModelIndex + 1) % particleSystems.length;
                    particleSystems[currentModelIndex].visible = true;
                    status.textContent = `✨ Animated Particles ${currentModelIndex + 1}/${particleSystems.length} | ✋ 3 fingers to cycle | ✊ Fist to hide`;
                }
            }

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if (modelActive) {
                    status.textContent = `✨ Animated Particles ${currentModelIndex + 1}/${particleSystems.length} | Show hand for gestures`;
                }
            }
        }

        // ============ MEDIAPIPE SETUP ============
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // ============ CAMERA SETUP ============
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: 'user' }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    
                    async function processFrame() {
                        if (video.readyState >= 2) {
                            await hands.send({ image: video });
                        }
                        requestAnimationFrame(processFrame);
                    }
                    processFrame();
                };
            } catch (error) {
                console.error('Camera error:', error);
                status.textContent = 'Camera access denied';
            }
        }

        hands.initialize().then(() => {
            startCamera();
        });

        // ============ ANIMATION LOOP ============
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();
            
            // Update shader uniforms for animation
            if (modelActive && particleSystems[currentModelIndex]) {
                const material = particleSystems[currentModelIndex].material;
                material.uniforms.time.value = elapsed;
                
                // Rotate the particle system
                particleSystems[currentModelIndex].rotation.y += 0.003;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // ============ WINDOW RESIZE ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
