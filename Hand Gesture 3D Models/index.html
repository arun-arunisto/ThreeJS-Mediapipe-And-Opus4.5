<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 1;
        }

        #three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <canvas id="three-canvas"></canvas>
        <div id="status">Loading MediaPipe...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============ THREE.JS SETUP ============
        const threeCanvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ 
            canvas: threeCanvas, 
            alpha: true,
            antialias: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        const directionalLight2 = new THREE.DirectionalLight(0x4488ff, 0.5);
        directionalLight2.position.set(-5, -5, 5);
        scene.add(directionalLight2);

        // Model management
        const modelPaths = [
            'image_models/turbine__turbofan_engine__jet_engine.glb',
            'image_models/ksp_primitive_orbital_station_complex.glb',
            'image_models/iss.glb'
        ];
        const loadedModels = [];
        let currentModelIndex = 0;
        let activeModel = null;
        let modelActivated = false; // Track if first model has been shown
        let canSwitch = true; // Debounce flag to prevent rapid switching
        
        const loader = new GLTFLoader();

        // ============ PARTICLE FORMATION EFFECT ============
        const particleCount = 2000;
        let particleSystem = null;
        let particlePositions = null;
        let particleTargetPositions = null;
        let particleStartPositions = null;
        let particleVelocities = null;
        let isFormingModel = false;
        let formationProgress = 0;
        const formationDuration = 2.0; // seconds
        let formationStartTime = 0;
        
        // Scatter effect (reverse of formation - fist to dismiss)
        let isScattering = false;
        let scatterProgress = 0;
        const scatterDuration = 1.5; // seconds (faster than formation)
        let scatterStartTime = 0;
        let particleScatterVelocities = null;
        
        // Create particle system
        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            particlePositions = new Float32Array(particleCount * 3);
            particleTargetPositions = new Float32Array(particleCount * 3);
            particleStartPositions = new Float32Array(particleCount * 3);
            particleVelocities = new Float32Array(particleCount * 3);
            
            // Initialize particles in random sphere around center
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = 3 + Math.random() * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                particlePositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                particlePositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                particlePositions[i3 + 2] = radius * Math.cos(phi);
                
                // Random velocities for swirling effect
                particleVelocities[i3] = (Math.random() - 0.5) * 0.02;
                particleVelocities[i3 + 1] = (Math.random() - 0.5) * 0.02;
                particleVelocities[i3 + 2] = (Math.random() - 0.5) * 0.02;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            
            // Create circular particle texture
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(100, 200, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(50, 150, 255, 0.8)');
            gradient.addColorStop(0.7, 'rgba(0, 100, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 50, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            
            const material = new THREE.PointsMaterial({
                size: 0.08,
                map: texture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: false
            });
            
            particleSystem = new THREE.Points(geometry, material);
            particleSystem.visible = false;
            scene.add(particleSystem);
        }
        
        // Extract vertices from a model to use as particle targets
        function extractModelVertices(model) {
            const vertices = [];
            
            model.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    const positionAttribute = child.geometry.getAttribute('position');
                    if (positionAttribute) {
                        const worldMatrix = child.matrixWorld;
                        for (let i = 0; i < positionAttribute.count; i++) {
                            const vertex = new THREE.Vector3(
                                positionAttribute.getX(i),
                                positionAttribute.getY(i),
                                positionAttribute.getZ(i)
                            );
                            vertex.applyMatrix4(worldMatrix);
                            vertices.push(vertex);
                        }
                    }
                }
            });
            
            return vertices;
        }
        
        // Start the particle formation effect
        function startParticleFormation(modelIndex) {
            if (!loadedModels[modelIndex] || !particleSystem) return;
            
            const model = loadedModels[modelIndex];
            
            // Make sure model matrices are updated
            model.visible = true;
            model.updateMatrixWorld(true);
            model.visible = false;
            
            // Extract vertices from model
            const vertices = extractModelVertices(model);
            
            if (vertices.length === 0) {
                // Fallback: just show the model directly
                showModel(modelIndex);
                return;
            }
            
            // Set particle targets from model vertices
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const vertexIndex = Math.floor(Math.random() * vertices.length);
                const vertex = vertices[vertexIndex];
                
                // Store start positions (current positions)
                particleStartPositions[i3] = particlePositions[i3];
                particleStartPositions[i3 + 1] = particlePositions[i3 + 1];
                particleStartPositions[i3 + 2] = particlePositions[i3 + 2];
                
                // Set target positions from model
                particleTargetPositions[i3] = vertex.x;
                particleTargetPositions[i3 + 1] = vertex.y;
                particleTargetPositions[i3 + 2] = vertex.z;
            }
            
            // Start formation
            isFormingModel = true;
            formationProgress = 0;
            formationStartTime = performance.now() / 1000;
            particleSystem.visible = true;
            
            // Store which model we're forming
            particleSystem.userData.targetModelIndex = modelIndex;
        }
        
        // Update particle formation animation
        function updateParticleFormation() {
            if (!isFormingModel || !particleSystem) return;
            
            const currentTime = performance.now() / 1000;
            const elapsed = currentTime - formationStartTime;
            formationProgress = Math.min(elapsed / formationDuration, 1);
            
            // Easing function for smooth animation (ease-in-out cubic)
            const eased = formationProgress < 0.5
                ? 4 * formationProgress * formationProgress * formationProgress
                : 1 - Math.pow(-2 * formationProgress + 2, 3) / 2;
            
            // Update particle positions
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // Add some swirl during formation
                const swirlAmount = (1 - eased) * 0.5;
                const angle = elapsed * 2 + i * 0.01;
                const swirlX = Math.sin(angle) * swirlAmount;
                const swirlY = Math.cos(angle * 0.7) * swirlAmount;
                
                // Interpolate between start and target
                particlePositions[i3] = particleStartPositions[i3] + 
                    (particleTargetPositions[i3] - particleStartPositions[i3]) * eased + swirlX;
                particlePositions[i3 + 1] = particleStartPositions[i3 + 1] + 
                    (particleTargetPositions[i3 + 1] - particleStartPositions[i3 + 1]) * eased + swirlY;
                particlePositions[i3 + 2] = particleStartPositions[i3 + 2] + 
                    (particleTargetPositions[i3 + 2] - particleStartPositions[i3 + 2]) * eased;
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // Update particle size and opacity based on progress
            const sizeFactor = 1 - eased * 0.5; // Particles get smaller as they form
            particleSystem.material.size = 0.08 * sizeFactor;
            particleSystem.material.opacity = 1 - eased * 0.3;
            
            // Check if formation is complete
            if (formationProgress >= 1) {
                completeFormation();
            }
        }
        
        // Complete the formation and show the actual model
        function completeFormation() {
            isFormingModel = false;
            particleSystem.visible = false;
            
            // Show the actual model
            const modelIndex = particleSystem.userData.targetModelIndex;
            showModel(modelIndex);
            
            // Reset particles to dispersed state for next time
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = 3 + Math.random() * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                particlePositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                particlePositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                particlePositions[i3 + 2] = radius * Math.cos(phi);
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.material.size = 0.08;
            particleSystem.material.opacity = 1;
        }
        
        // Start the particle scatter effect (reverse of formation)
        function startParticleScatter() {
            if (!activeModel || !particleSystem || isScattering) return;
            
            // Extract vertices from current model
            const vertices = extractModelVertices(activeModel);
            
            if (vertices.length === 0) {
                // Fallback: just hide the model directly
                hideModel();
                return;
            }
            
            // Initialize particle positions from model vertices
            particleScatterVelocities = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const vertexIndex = Math.floor(Math.random() * vertices.length);
                const vertex = vertices[vertexIndex];
                
                // Start positions from model
                particleStartPositions[i3] = vertex.x;
                particleStartPositions[i3 + 1] = vertex.y;
                particleStartPositions[i3 + 2] = vertex.z;
                
                // Current positions start at model
                particlePositions[i3] = vertex.x;
                particlePositions[i3 + 1] = vertex.y;
                particlePositions[i3 + 2] = vertex.z;
                
                // Random outward velocities for explosion effect
                const angle = Math.random() * Math.PI * 2;
                const upAngle = Math.acos(2 * Math.random() - 1);
                const speed = 2 + Math.random() * 4;
                
                particleScatterVelocities[i3] = speed * Math.sin(upAngle) * Math.cos(angle);
                particleScatterVelocities[i3 + 1] = speed * Math.sin(upAngle) * Math.sin(angle);
                particleScatterVelocities[i3 + 2] = speed * Math.cos(upAngle);
            }
            
            // Hide the model, show particles
            activeModel.visible = false;
            particleSystem.visible = true;
            particleSystem.material.size = 0.04; // Start smaller
            particleSystem.material.opacity = 1;
            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // Start scatter animation
            isScattering = true;
            scatterProgress = 0;
            scatterStartTime = performance.now() / 1000;
        }
        
        // Update particle scatter animation
        function updateParticleScatter() {
            if (!isScattering || !particleSystem) return;
            
            const currentTime = performance.now() / 1000;
            const elapsed = currentTime - scatterStartTime;
            scatterProgress = Math.min(elapsed / scatterDuration, 1);
            
            // Easing function (ease-out cubic for fast start, slow end)
            const eased = 1 - Math.pow(1 - scatterProgress, 3);
            
            // Update particle positions
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // Add some spin during scatter
                const spinAmount = eased * 3;
                const spinAngle = elapsed * 4 + i * 0.02;
                const spinX = Math.sin(spinAngle) * spinAmount * 0.1;
                const spinY = Math.cos(spinAngle * 0.7) * spinAmount * 0.1;
                
                // Move outward from start position based on velocity
                particlePositions[i3] = particleStartPositions[i3] + 
                    particleScatterVelocities[i3] * eased + spinX;
                particlePositions[i3 + 1] = particleStartPositions[i3 + 1] + 
                    particleScatterVelocities[i3 + 1] * eased + spinY;
                particlePositions[i3 + 2] = particleStartPositions[i3 + 2] + 
                    particleScatterVelocities[i3 + 2] * eased;
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // Update particle size and opacity - grow then fade
            const sizeFactor = 1 + eased * 2; // Particles grow as they scatter
            const opacityFactor = 1 - eased; // Fade out
            particleSystem.material.size = 0.04 * sizeFactor;
            particleSystem.material.opacity = opacityFactor;
            
            // Check if scatter is complete
            if (scatterProgress >= 1) {
                completeScatter();
            }
        }
        
        // Complete the scatter and reset to waiting state
        function completeScatter() {
            isScattering = false;
            particleSystem.visible = true; // Keep visible for idle animation
            
            // Hide all models and reset state
            hideModel();
            
            // Reset particles to dispersed state for idle animation
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = 3 + Math.random() * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                particlePositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                particlePositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                particlePositions[i3 + 2] = radius * Math.cos(phi);
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.material.size = 0.08;
            particleSystem.material.opacity = 1;
        }
        
        // Hide model and reset to waiting state
        function hideModel() {
            loadedModels.forEach(model => {
                if (model) model.visible = false;
            });
            activeModel = null;
            modelActivated = false;
            currentModelIndex = 0;
            
            // Reset scale and rotation variables
            isPinching = false;
            initialPinchDistance = null;
            pinchDistanceHistory.length = 0;
            isRotating = false;
            autoRotate = true;
        }
        
        // Update idle particle animation (swirling when not forming)
        function updateIdleParticles() {
            if (isFormingModel || isScattering || !particleSystem || !particleSystem.visible) return;
            if (modelActivated) return; // Don't animate idle particles when model is shown
            
            const time = performance.now() / 1000;
            
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // Gentle swirling motion
                particlePositions[i3] += particleVelocities[i3] + Math.sin(time + i) * 0.001;
                particlePositions[i3 + 1] += particleVelocities[i3 + 1] + Math.cos(time * 0.7 + i) * 0.001;
                particlePositions[i3 + 2] += particleVelocities[i3 + 2];
                
                // Keep particles in a sphere
                const x = particlePositions[i3];
                const y = particlePositions[i3 + 1];
                const z = particlePositions[i3 + 2];
                const dist = Math.sqrt(x * x + y * y + z * z);
                
                if (dist > 6) {
                    const scale = 6 / dist;
                    particlePositions[i3] *= scale;
                    particlePositions[i3 + 1] *= scale;
                    particlePositions[i3 + 2] *= scale;
                }
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }
        
        // Create the particle system on init
        createParticleSystem();

        // Load all models
        function loadModel(path, index) {
            return new Promise((resolve, reject) => {
                loader.load(
                    path,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // Center and scale the model
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 2 / maxDim;
                        model.scale.setScalar(scale);
                        
                        model.position.sub(center.multiplyScalar(scale));
                        model.visible = false;
                        
                        scene.add(model);
                        loadedModels[index] = model;
                        console.log(`Model loaded: ${path}`);
                        resolve(model);
                    },
                    (progress) => {
                        if (progress.total > 0) {
                            console.log(`Loading ${path}: ${(progress.loaded / progress.total * 100).toFixed(1)}%`);
                        }
                    },
                    (error) => {
                        console.error(`Error loading ${path}:`, error);
                        reject(error);
                    }
                );
            });
        }

        // Load all models (hidden by default)
        Promise.all(modelPaths.map((path, index) => loadModel(path, index)))
            .then(() => {
                console.log('All models loaded - make a fist to start!');
                // Show particles in idle/waiting state
                if (particleSystem) {
                    particleSystem.visible = true;
                }
            })
            .catch(err => console.error('Error loading models:', err));

        // Switch to a specific model
        function showModel(index) {
            // Hide all models
            loadedModels.forEach(model => {
                if (model) model.visible = false;
            });
            
            // Show the selected model
            if (loadedModels[index]) {
                loadedModels[index].visible = true;
                activeModel = loadedModels[index];
                currentModelIndex = index;
                modelActivated = true;
                
                // Sync scale variables with new model
                currentScale = activeModel.scale.x;
                targetScale = currentScale;
                baseScale = currentScale;
                pinchDistanceHistory.length = 0; // Clear history
                
                // Reset rotation variables
                currentRotationX = activeModel.rotation.x;
                currentRotationY = activeModel.rotation.y;
                targetRotationX = currentRotationX;
                targetRotationY = currentRotationY;
                baseRotationX = currentRotationX;
                baseRotationY = currentRotationY;
                isRotating = false;
                autoRotate = true;
                
                console.log(`Switched to model ${index + 1}/${modelPaths.length}`);
            }
        }

        // Cycle to next model
        function cycleModel() {
            if (!canSwitch) return;
            
            canSwitch = false;
            const nextIndex = (currentModelIndex + 1) % loadedModels.length;
            showModel(nextIndex);
            
            // Debounce - wait 800ms before allowing another switch
            setTimeout(() => {
                canSwitch = true;
            }, 800);
        }

        // Count extended fingers on a hand
        function countFingers(landmarks) {
            let count = 0;
            
            // Thumb: check if tip (4) is extended away from palm
            // Compare x position relative to the hand orientation
            const thumbTip = landmarks[4];
            const thumbIP = landmarks[3];
            const thumbMCP = landmarks[2];
            // Thumb is extended if tip is further from palm than IP joint
            if (Math.abs(thumbTip.x - thumbMCP.x) > Math.abs(thumbIP.x - thumbMCP.x)) {
                count++;
            }
            
            // Index finger: tip (8) above PIP (6) means extended
            if (landmarks[8].y < landmarks[6].y) {
                count++;
            }
            
            // Middle finger: tip (12) above PIP (10)
            if (landmarks[12].y < landmarks[10].y) {
                count++;
            }
            
            // Ring finger: tip (16) above PIP (14)
            if (landmarks[16].y < landmarks[14].y) {
                count++;
            }
            
            // Pinky: tip (20) above PIP (18)
            if (landmarks[20].y < landmarks[18].y) {
                count++;
            }
            
            return count;
        }

        // Store finger count and detection state for gesture detection
        let leftHandFingerCount = 0;
        let leftHandDetected = false;
        let rightHandFingerCount = 0;
        
        // Right hand pinch tracking for model scaling
        let rightHandDetected = false;
        let pinchDistance = 0;
        let baseScale = 1; // Store the base scale for each model
        let initialPinchDistance = null; // For relative scaling
        let isPinching = false;
        
        // Smoothing for scale changes
        let targetScale = 1;
        let currentScale = 1;
        const scaleSmoothingFactor = 0.15; // Lower = smoother, higher = more responsive
        const pinchDistanceHistory = []; // Moving average for pinch distance
        const pinchHistorySize = 5; // Number of frames to average
        
        // Both hands rotation control (5 fingers each)
        let isRotating = false;
        let leftHandPos = { x: 0, y: 0 };
        let rightHandPos = { x: 0, y: 0 };
        let initialLeftHandPos = null;
        let initialRightHandPos = null;
        let baseRotationX = 0;
        let baseRotationY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        const rotationSmoothingFactor = 0.12;
        const rotationSensitivity = 4; // How much hand movement affects rotation
        let autoRotate = true; // Auto rotation flag

        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);

        // Three.js animation loop
        function animateThree() {
            requestAnimationFrame(animateThree);
            
            if (activeModel) {
                // Check for dual open palm rotation mode
                const bothHandsOpen = leftHandDetected && rightHandDetected && 
                                      leftHandFingerCount === 5 && rightHandFingerCount === 5;
                
                if (bothHandsOpen && modelActivated) {
                    autoRotate = false;
                    
                    // Start rotation mode
                    if (!isRotating) {
                        isRotating = true;
                        initialLeftHandPos = { ...leftHandPos };
                        initialRightHandPos = { ...rightHandPos };
                        baseRotationX = activeModel.rotation.x;
                        baseRotationY = activeModel.rotation.y;
                    }
                    
                    // Calculate rotation based on hand movement
                    // Average of both hands' horizontal movement controls Y rotation
                    const avgDeltaX = ((leftHandPos.x - initialLeftHandPos.x) + 
                                       (rightHandPos.x - initialRightHandPos.x)) / 2;
                    // Average of both hands' vertical movement controls X rotation
                    const avgDeltaY = ((leftHandPos.y - initialLeftHandPos.y) + 
                                       (rightHandPos.y - initialRightHandPos.y)) / 2;
                    
                    targetRotationY = baseRotationY - avgDeltaX * rotationSensitivity;
                    targetRotationX = baseRotationX + avgDeltaY * rotationSensitivity;
                    
                    // Clamp X rotation to prevent flipping
                    targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
                } else {
                    // End rotation mode
                    if (isRotating) {
                        isRotating = false;
                        initialLeftHandPos = null;
                        initialRightHandPos = null;
                        // Keep the current rotation as the new base
                        baseRotationX = activeModel.rotation.x;
                        baseRotationY = activeModel.rotation.y;
                    }
                    
                    // Resume auto rotation when not in rotation mode
                    if (!isRotating && autoRotate) {
                        targetRotationY += 0.01;
                    }
                }
                
                // Smoothly interpolate rotation
                currentRotationX += (targetRotationX - currentRotationX) * rotationSmoothingFactor;
                currentRotationY += (targetRotationY - currentRotationY) * rotationSmoothingFactor;
                activeModel.rotation.x = currentRotationX;
                activeModel.rotation.y = currentRotationY;
                
                // Apply pinch scaling if right hand is pinching (only if not rotating)
                if (!isRotating && rightHandDetected && isPinching && initialPinchDistance !== null) {
                    // Calculate smoothed pinch distance using moving average
                    pinchDistanceHistory.push(pinchDistance);
                    if (pinchDistanceHistory.length > pinchHistorySize) {
                        pinchDistanceHistory.shift();
                    }
                    const smoothedPinchDistance = pinchDistanceHistory.reduce((a, b) => a + b, 0) / pinchDistanceHistory.length;
                    
                    const scaleFactor = smoothedPinchDistance / initialPinchDistance;
                    const newScale = baseScale * scaleFactor;
                    // Clamp scale between 0.3 and 5
                    targetScale = Math.max(0.3, Math.min(5, newScale));
                }
                
                // Smoothly interpolate current scale towards target scale
                currentScale += (targetScale - currentScale) * scaleSmoothingFactor;
                activeModel.scale.setScalar(currentScale);
            }
            
            // If not activated yet, check for fist (0 fingers) to show first model
            if (!modelActivated && !isFormingModel && !isScattering && leftHandDetected && leftHandFingerCount === 0 && loadedModels.length > 0) {
                // Small delay to confirm it's a fist, not just transitioning
                if (canSwitch) {
                    canSwitch = false;
                    // Start particle formation effect instead of directly showing model
                    startParticleFormation(0);
                    setTimeout(() => {
                        canSwitch = true;
                    }, 800);
                }
            }
            // If activated, check for fist (0 fingers) to scatter/dismiss model
            else if (modelActivated && !isScattering && !isFormingModel && leftHandDetected && leftHandFingerCount === 0) {
                if (canSwitch) {
                    canSwitch = false;
                    startParticleScatter();
                    setTimeout(() => {
                        canSwitch = true;
                    }, 1000);
                }
            }
            // If activated, check for 3 fingers to cycle
            else if (modelActivated && leftHandDetected && leftHandFingerCount === 3) {
                cycleModel();
            }
            
            // Update particle effects
            updateParticleFormation();
            updateParticleScatter();
            updateIdleParticles();
            
            renderer.render(scene, camera);
        }
        animateThree();

        // ============ MEDIAPIPE HAND TRACKING ============
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusElement = document.getElementById('status');

        // Hand landmark connections for drawing
        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],       // Thumb
            [0, 5], [5, 6], [6, 7], [7, 8],       // Index
            [0, 9], [9, 10], [10, 11], [11, 12], // Middle
            [0, 13], [13, 14], [14, 15], [15, 16], // Ring
            [0, 17], [17, 18], [18, 19], [19, 20], // Pinky
            [5, 9], [9, 13], [13, 17]             // Palm
        ];

        // Resize canvas to match video dimensions
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Draw landmarks on canvas
        function drawLandmarks(landmarks, color = '#00FF00', radius = 5) {
            for (const landmark of landmarks) {
                const x = landmark.x * canvasElement.width;
                const y = landmark.y * canvasElement.height;

                canvasCtx.beginPath();
                canvasCtx.arc(x, y, radius, 0, 2 * Math.PI);
                canvasCtx.fillStyle = color;
                canvasCtx.fill();
            }
        }

        // Draw connections between landmarks
        function drawConnections(landmarks, connections, color = '#00FF00', lineWidth = 2) {
            canvasCtx.strokeStyle = color;
            canvasCtx.lineWidth = lineWidth;

            for (const [start, end] of connections) {
                const startLandmark = landmarks[start];
                const endLandmark = landmarks[end];

                canvasCtx.beginPath();
                canvasCtx.moveTo(
                    startLandmark.x * canvasElement.width,
                    startLandmark.y * canvasElement.height
                );
                canvasCtx.lineTo(
                    endLandmark.x * canvasElement.width,
                    endLandmark.y * canvasElement.height
                );
                canvasCtx.stroke();
            }
        }

        // Process hand detection results
        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Reset detection state
            leftHandFingerCount = 0;
            leftHandDetected = false;
            rightHandDetected = false;
            rightHandFingerCount = 0;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let statusText = '';

                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label;
                    
                    // Different colors for left/right hands
                    const color = handedness === 'Left' ? '#FF6B6B' : '#4ECDC4';

                    drawConnections(landmarks, HAND_CONNECTIONS, color, 3);
                    drawLandmarks(landmarks, color, 6);
                    
                    // Count fingers on left hand for model switching
                    if (handedness === 'Left') {
                        leftHandDetected = true;
                        leftHandFingerCount = countFingers(landmarks);
                        
                        // Track hand position for rotation control (use palm center - average of wrist and middle finger base)
                        const wrist = landmarks[0];
                        const middleBase = landmarks[9];
                        leftHandPos.x = (wrist.x + middleBase.x) / 2;
                        leftHandPos.y = (wrist.y + middleBase.y) / 2;
                        
                        // Draw finger count near the wrist
                        const x = wrist.x * canvasElement.width;
                        const y = wrist.y * canvasElement.height + 40;
                        
                        canvasCtx.font = 'bold 32px monospace';
                        // Color based on state: fist=green when waiting, red when scattering, 3=gold when switching, 5=purple for rotation
                        let displayColor = '#FF6B6B';
                        if (!modelActivated && leftHandFingerCount === 0) {
                            displayColor = isFormingModel ? '#00FFFF' : '#00FF00'; // Cyan when forming, green for fist
                        } else if (modelActivated && leftHandFingerCount === 0) {
                            displayColor = isScattering ? '#FF6B6B' : '#FF9500'; // Red when scattering, orange for fist
                        } else if (modelActivated && leftHandFingerCount === 3) {
                            displayColor = '#FFD700'; // Gold for switching
                        } else if (modelActivated && leftHandFingerCount === 5 && isRotating) {
                            displayColor = '#9B59B6'; // Purple for rotation
                        }
                        canvasCtx.fillStyle = displayColor;
                        canvasCtx.textAlign = 'center';
                        
                        // Show gesture name instead of just finger count
                        let gestureText = `${leftHandFingerCount} fingers`;
                        if (!modelActivated && leftHandFingerCount === 0) {
                            if (isFormingModel) {
                                gestureText = `FORMING ⚡ ${Math.round(formationProgress * 100)}%`;
                            } else {
                                gestureText = 'FIST ✊ (summon)';
                            }
                        } else if (modelActivated && leftHandFingerCount === 0) {
                            if (isScattering) {
                                gestureText = `SCATTER 💥 ${Math.round(scatterProgress * 100)}%`;
                            } else {
                                gestureText = 'FIST ✊ (dismiss)';
                            }
                        } else if (modelActivated && leftHandFingerCount === 3) {
                            gestureText = '3 FINGERS ✋';
                        } else if (modelActivated && leftHandFingerCount === 5) {
                            gestureText = isRotating ? 'ROTATING 🔄' : 'OPEN 🖐';
                        }
                        canvasCtx.fillText(gestureText, x, y);
                        
                        statusText = `Left: ${leftHandFingerCount}`;
                    }
                    
                    // Right hand: pinch gesture for scaling or rotation with left hand
                    if (handedness === 'Right') {
                        rightHandDetected = true;
                        rightHandFingerCount = countFingers(landmarks);
                        
                        // Track hand position for rotation control
                        const wrist = landmarks[0];
                        const middleBase = landmarks[9];
                        rightHandPos.x = (wrist.x + middleBase.x) / 2;
                        rightHandPos.y = (wrist.y + middleBase.y) / 2;
                        
                        // Get thumb tip (4) and index finger tip (8)
                        const thumbTip = landmarks[4];
                        const indexTip = landmarks[8];
                        
                        // Calculate distance between thumb and index finger
                        const dx = thumbTip.x - indexTip.x;
                        const dy = thumbTip.y - indexTip.y;
                        pinchDistance = Math.sqrt(dx * dx + dy * dy);
                        
                        // Pinch thresholds
                        const pinchStartThreshold = 0.08; // Start pinch when fingers are this close
                        const pinchEndThreshold = 0.25;   // End pinch when fingers spread beyond this
                        
                        // Check if starting a new pinch
                        if (!isPinching && pinchDistance < pinchStartThreshold && modelActivated) {
                            isPinching = true;
                            initialPinchDistance = pinchDistance;
                            pinchDistanceHistory.length = 0; // Clear history when starting new pinch
                            if (activeModel) {
                                baseScale = activeModel.scale.x;
                            }
                        }
                        
                        // Check if pinch should end (fingers spread too far apart)
                        if (isPinching && pinchDistance > pinchEndThreshold) {
                            isPinching = false;
                            initialPinchDistance = null;
                            pinchDistanceHistory.length = 0; // Clear history
                            if (activeModel) {
                                baseScale = activeModel.scale.x;
                                targetScale = baseScale;
                            }
                        }
                        
                        // Draw pinch indicator (only when not in rotation mode)
                        const thumbX = thumbTip.x * canvasElement.width;
                        const thumbY = thumbTip.y * canvasElement.height;
                        const indexX = indexTip.x * canvasElement.width;
                        const indexY = indexTip.y * canvasElement.height;
                        
                        // Check if in rotation mode (both hands open)
                        const inRotationMode = rightHandFingerCount === 5 && leftHandDetected && leftHandFingerCount === 5;
                        
                        if (!inRotationMode) {
                            // Draw line between thumb and index
                            canvasCtx.beginPath();
                            canvasCtx.moveTo(thumbX, thumbY);
                            canvasCtx.lineTo(indexX, indexY);
                            canvasCtx.strokeStyle = isPinching ? '#FFD700' : '#4ECDC4';
                            canvasCtx.lineWidth = isPinching ? 4 : 2;
                            canvasCtx.stroke();
                            
                            // Draw circles on thumb and index tips
                            canvasCtx.beginPath();
                            canvasCtx.arc(thumbX, thumbY, isPinching ? 12 : 8, 0, 2 * Math.PI);
                            canvasCtx.fillStyle = isPinching ? '#FFD700' : '#4ECDC4';
                            canvasCtx.fill();
                            
                            canvasCtx.beginPath();
                            canvasCtx.arc(indexX, indexY, isPinching ? 12 : 8, 0, 2 * Math.PI);
                            canvasCtx.fill();
                        }
                        
                        // Draw info near the right hand
                        const rx = wrist.x * canvasElement.width;
                        const ry = wrist.y * canvasElement.height + 40;
                        
                        canvasCtx.font = 'bold 24px monospace';
                        
                        if (inRotationMode && isRotating) {
                            // Rotation mode display
                            canvasCtx.fillStyle = '#9B59B6'; // Purple for rotation
                            canvasCtx.textAlign = 'center';
                            canvasCtx.fillText('ROTATING 🔄', rx, ry);
                        } else if (inRotationMode) {
                            canvasCtx.fillStyle = '#9B59B6';
                            canvasCtx.textAlign = 'center';
                            canvasCtx.fillText('OPEN 🖐', rx, ry);
                        } else {
                            canvasCtx.fillStyle = isPinching ? '#FFD700' : '#4ECDC4';
                            canvasCtx.textAlign = 'center';
                            
                            if (modelActivated && activeModel) {
                                const scalePercent = Math.round(activeModel.scale.x * 50);
                                canvasCtx.fillText(isPinching ? `Scale: ${scalePercent}%` : 'Pinch to scale', rx, ry);
                            } else {
                                canvasCtx.fillText('Pinch to scale', rx, ry);
                            }
                        }
                        
                        if (statusText) statusText += ' | ';
                        statusText += `Right: ${rightHandFingerCount}`;
                    }
                }
                
                // Draw rotation mode visual indicator (connect both hands)
                if (isRotating && leftHandDetected && rightHandDetected) {
                    const leftX = leftHandPos.x * canvasElement.width;
                    const leftY = leftHandPos.y * canvasElement.height;
                    const rightX = rightHandPos.x * canvasElement.width;
                    const rightY = rightHandPos.y * canvasElement.height;
                    
                    // Draw connecting line
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(leftX, leftY);
                    canvasCtx.lineTo(rightX, rightY);
                    canvasCtx.strokeStyle = '#9B59B6';
                    canvasCtx.lineWidth = 4;
                    canvasCtx.setLineDash([10, 5]);
                    canvasCtx.stroke();
                    canvasCtx.setLineDash([]);
                    
                    // Draw circles at hand centers
                    canvasCtx.beginPath();
                    canvasCtx.arc(leftX, leftY, 15, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'rgba(155, 89, 182, 0.5)';
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = '#9B59B6';
                    canvasCtx.lineWidth = 3;
                    canvasCtx.stroke();
                    
                    canvasCtx.beginPath();
                    canvasCtx.arc(rightX, rightY, 15, 0, 2 * Math.PI);
                    canvasCtx.fill();
                    canvasCtx.stroke();
                }
                
                // Draw scatter visual indicator (when scattering with fist)
                if (isScattering && leftHandDetected) {
                    const leftX = leftHandPos.x * canvasElement.width;
                    const leftY = leftHandPos.y * canvasElement.height;
                    
                    // Draw explosion burst effect around fist
                    const numLines = 12;
                    const lineLength = 40 + scatterProgress * 60;
                    canvasCtx.strokeStyle = '#FF6B6B';
                    canvasCtx.lineWidth = 3;
                    
                    for (let j = 0; j < numLines; j++) {
                        const angle = (j / numLines) * Math.PI * 2;
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(leftX + Math.cos(angle) * 30, leftY + Math.sin(angle) * 30);
                        canvasCtx.lineTo(leftX + Math.cos(angle) * lineLength, leftY + Math.sin(angle) * lineLength);
                        canvasCtx.stroke();
                    }
                    
                    // Draw center circle
                    canvasCtx.beginPath();
                    canvasCtx.arc(leftX, leftY, 25, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = 'rgba(255, 107, 107, 0.7)';
                    canvasCtx.fill();
                    
                    // Draw "SCATTER!" text
                    canvasCtx.font = 'bold 24px monospace';
                    canvasCtx.fillStyle = '#FF6B6B';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.fillText('💥 SCATTER!', leftX, leftY - 60);
                }
                
                // Reset pinch state if right hand not detected
                if (!rightHandDetected && isPinching) {
                    isPinching = false;
                    initialPinchDistance = null;
                    pinchDistanceHistory.length = 0; // Clear history
                    // Save the current scale as the new base
                    if (activeModel) {
                        baseScale = activeModel.scale.x;
                        targetScale = baseScale;
                    }
                }
                
                let hint;
                if (!modelActivated) {
                    if (isScattering) {
                        const percent = Math.round(scatterProgress * 100);
                        hint = ` 💥 SCATTERING... ${percent}%`;
                    } else if (isFormingModel) {
                        const percent = Math.round(formationProgress * 100);
                        hint = ` ⚡ FORMING MODEL... ${percent}%`;
                    } else if (leftHandDetected && leftHandFingerCount === 0) {
                        hint = ' ✓ FIST DETECTED!';
                    } else {
                        hint = ' | Make a FIST to start';
                    }
                    statusElement.textContent = `Waiting... | ${statusText}${hint}`;
                } else {
                    if (isScattering) {
                        const percent = Math.round(scatterProgress * 100);
                        hint = ` 💥 SCATTERING... ${percent}%`;
                    } else if (isRotating) {
                        hint = ' ✓ ROTATING!';
                    } else if (leftHandDetected && leftHandFingerCount === 0) {
                        hint = ' ✊ FIST - DISMISS!';
                    } else if (leftHandDetected && leftHandFingerCount === 3) {
                        hint = ' ✓ SWITCHING!';
                    } else if (isPinching) {
                        hint = ' ✓ SCALING!';
                    } else {
                        hint = ' | FIST to dismiss';
                    }
                    statusElement.textContent = `Model: ${currentModelIndex + 1}/${modelPaths.length} | ${statusText}${hint}`;
                }
            } else {
                // Reset pinch state when no hands detected
                isPinching = false;
                initialPinchDistance = null;
                pinchDistanceHistory.length = 0; // Clear history
                
                // Reset rotation state when no hands detected
                if (isRotating) {
                    isRotating = false;
                    initialLeftHandPos = null;
                    initialRightHandPos = null;
                }
                
                if (!modelActivated) {
                    statusElement.textContent = 'Show left hand and make a FIST to start';
                } else {
                    statusElement.textContent = `No hands detected | Model: ${currentModelIndex + 1}/${modelPaths.length}`;
                }
            }
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Start webcam
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: 'user'
                    }
                });

                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    statusElement.textContent = 'Hand tracking ready - show your hands!';
                    
                    // Process video frames
                    async function processFrame() {
                        if (videoElement.readyState >= 2) {
                            await hands.send({ image: videoElement });
                        }
                        requestAnimationFrame(processFrame);
                    }
                    
                    processFrame();
                };
            } catch (error) {
                statusElement.textContent = `Camera error: ${error.message}`;
                console.error('Camera error:', error);
            }
        }

        // Initialize
        hands.initialize().then(() => {
            statusElement.textContent = 'Starting camera...';
            startCamera();
        }).catch((error) => {
            statusElement.textContent = `MediaPipe error: ${error.message}`;
            console.error('MediaPipe error:', error);
        });
    </script>
</body>
</html>
