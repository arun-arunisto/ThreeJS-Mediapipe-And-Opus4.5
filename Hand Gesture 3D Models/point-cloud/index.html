<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Cloud Mode - Hand Gesture 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #mode-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #00ffff, #0080ff);
            color: #000;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
        }

        .hand-connections {
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <canvas id="three-canvas"></canvas>
        <div id="mode-label">☁️ POINT CLOUD MODE</div>
        <div id="status">Loading...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============ THREE.JS SETUP ============
        const threeCanvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // ============ MODEL LOADING ============
        const modelPaths = [
            '../image_models/turbine__turbofan_engine__jet_engine.glb',
            '../image_models/ksp_primitive_orbital_station_complex.glb',
            '../image_models/iss.glb'
        ];

        const loader = new GLTFLoader();
        const models = [];
        const pointClouds = [];
        let currentModelIndex = 0;
        let modelsLoaded = 0;
        let modelActive = false;

        // Load models and create point clouds
        modelPaths.forEach((path, index) => {
            loader.load(path, (gltf) => {
                const model = gltf.scene;
                
                // Center and scale the model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim;
                
                model.scale.setScalar(scale);
                model.position.sub(center.multiplyScalar(scale));
                model.updateMatrixWorld(true);
                
                models[index] = model;
                
                // Create point cloud from model vertices
                const pointCloud = createPointCloud(model);
                pointCloud.visible = false;
                pointClouds[index] = pointCloud;
                scene.add(pointCloud);
                
                modelsLoaded++;
                if (modelsLoaded === modelPaths.length) {
                    document.getElementById('status').textContent = '✊ Make a FIST to show point cloud';
                }
            }, 
            (progress) => {
                const percent = (progress.loaded / progress.total * 100).toFixed(0);
                document.getElementById('status').textContent = `Loading models... ${percent}%`;
            },
            (error) => {
                console.error('Error loading model:', error);
            });
        });

        function createPointCloud(model) {
            const positions = [];
            const colors = [];
            
            model.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    const posAttr = child.geometry.attributes.position;
                    const matrix = child.matrixWorld;
                    
                    for (let i = 0; i < posAttr.count; i++) {
                        const vertex = new THREE.Vector3(
                            posAttr.getX(i),
                            posAttr.getY(i),
                            posAttr.getZ(i)
                        ).applyMatrix4(matrix);
                        
                        positions.push(vertex.x, vertex.y, vertex.z);
                        
                        // Color based on position (cyan to blue gradient)
                        const t = (vertex.y + 1.5) / 3;
                        colors.push(0.0, 0.8 + t * 0.2, 1.0);
                    }
                }
            });
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            // Create circular particle texture
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.7, 'rgba(255, 255, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            const texture = new THREE.CanvasTexture(canvas);
            
            const material = new THREE.PointsMaterial({
                size: 0.03,
                map: texture,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                depthWrite: false
            });
            
            return new THREE.Points(geometry, material);
        }

        // ============ HAND TRACKING SETUP ============
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let gestureTimeout = false;

        // Hand connections for drawing
        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],
            [0, 5], [5, 6], [6, 7], [7, 8],
            [0, 9], [9, 10], [10, 11], [11, 12],
            [0, 13], [13, 14], [14, 15], [15, 16],
            [0, 17], [17, 18], [18, 19], [19, 20],
            [5, 9], [9, 13], [13, 17]
        ];

        function countFingers(landmarks) {
            let count = 0;
            
            // Thumb
            const thumbTip = landmarks[4];
            const thumbIP = landmarks[3];
            const thumbMCP = landmarks[2];
            if (Math.abs(thumbTip.x - thumbMCP.x) > Math.abs(thumbIP.x - thumbMCP.x) * 1.2) {
                count++;
            }
            
            // Other fingers
            if (landmarks[8].y < landmarks[6].y) count++;
            if (landmarks[12].y < landmarks[10].y) count++;
            if (landmarks[16].y < landmarks[14].y) count++;
            if (landmarks[20].y < landmarks[18].y) count++;
            
            return count;
        }

        function drawLandmarks(landmarks, color) {
            ctx.fillStyle = color;
            for (const landmark of landmarks) {
                const x = landmark.x * canvas.width;
                const y = landmark.y * canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function drawConnections(landmarks, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            for (const [start, end] of HAND_CONNECTIONS) {
                ctx.beginPath();
                ctx.moveTo(landmarks[start].x * canvas.width, landmarks[start].y * canvas.height);
                ctx.lineTo(landmarks[end].x * canvas.width, landmarks[end].y * canvas.height);
                ctx.stroke();
            }
        }

        function onResults(results) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let leftHand = null;

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label;
                    const isLeft = handedness === 'Right'; // Mirrored

                    // Draw landmarks
                    const color = isLeft ? '#FF6B6B' : '#4ECDC4';
                    drawConnections(landmarks, color);
                    drawLandmarks(landmarks, color);

                    if (isLeft) {
                        leftHand = landmarks;
                    }
                }
            }

            // Handle gestures
            if (leftHand && !gestureTimeout) {
                const fingerCount = countFingers(leftHand);
                
                // Draw finger count
                const wrist = leftHand[0];
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = fingerCount === 0 ? '#00FF00' : fingerCount === 3 ? '#FFD700' : '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.fillText(fingerCount.toString(), wrist.x * canvas.width, wrist.y * canvas.height + 60);

                if (fingerCount === 0) {
                    // Fist - toggle model
                    gestureTimeout = true;
                    setTimeout(() => gestureTimeout = false, 800);
                    
                    if (!modelActive) {
                        // Show point cloud
                        pointClouds[currentModelIndex].visible = true;
                        modelActive = true;
                        status.textContent = `☁️ Point Cloud ${currentModelIndex + 1}/${pointClouds.length} | ✋ 3 fingers to cycle | ✊ Fist to hide`;
                    } else {
                        // Hide point cloud
                        pointClouds[currentModelIndex].visible = false;
                        modelActive = false;
                        status.textContent = '✊ Make a FIST to show point cloud';
                    }
                } else if (fingerCount === 3 && modelActive) {
                    // 3 fingers - cycle models
                    gestureTimeout = true;
                    setTimeout(() => gestureTimeout = false, 800);
                    
                    pointClouds[currentModelIndex].visible = false;
                    currentModelIndex = (currentModelIndex + 1) % pointClouds.length;
                    pointClouds[currentModelIndex].visible = true;
                    status.textContent = `☁️ Point Cloud ${currentModelIndex + 1}/${pointClouds.length} | ✋ 3 fingers to cycle | ✊ Fist to hide`;
                }
            }

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if (modelActive) {
                    status.textContent = `☁️ Point Cloud ${currentModelIndex + 1}/${pointClouds.length} | Show hand for gestures`;
                }
            }
        }

        // ============ MEDIAPIPE SETUP ============
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // ============ CAMERA SETUP ============
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: 'user' }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    
                    async function processFrame() {
                        if (video.readyState >= 2) {
                            await hands.send({ image: video });
                        }
                        requestAnimationFrame(processFrame);
                    }
                    processFrame();
                };
            } catch (error) {
                console.error('Camera error:', error);
                status.textContent = 'Camera access denied';
            }
        }

        hands.initialize().then(() => {
            startCamera();
        });

        // ============ ANIMATION LOOP ============
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate active point cloud
            if (modelActive && pointClouds[currentModelIndex]) {
                pointClouds[currentModelIndex].rotation.y += 0.005;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // ============ WINDOW RESIZE ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
